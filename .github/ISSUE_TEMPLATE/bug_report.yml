name: Bug Report
description: Etwas funktioniert nicht wie erwartet
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für den Bug-Report! Bitte fülle alle Felder aus — je mehr Details, desto schneller der Fix.
        **Sicherheitslücken bitte nicht hier melden** → siehe [SECURITY.md](../SECURITY.md)

  - type: textarea
    id: description
    attributes:
      label: Was ist passiert?
      description: Kurze Beschreibung des Fehlers
      placeholder: "Wenn ich auf 'Antworten generieren' klicke, passiert nichts und..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Schritte zur Reproduktion
      description: Wie kann der Bug reproduziert werden?
      value: |
        1. Gehe zu ...
        2. Klicke auf ...
        3. Sieh den Fehler ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Was wurde erwartet?
      placeholder: "Die App sollte drei Antwortvarianten anzeigen."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Was ist stattdessen passiert?
      placeholder: "Es erscheint eine leere Seite / Fehlermeldung: ..."
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP-Version
      placeholder: "php -v"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser + Version
      placeholder: "Chrome 125, Firefox 126, Safari 17 ..."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Fehlermeldungen / Logs
      description: Apache-Error-Log, PHP-Fehler, Browser-Konsole
      render: text
    validations:
      required: false
