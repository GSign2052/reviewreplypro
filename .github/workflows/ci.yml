name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} / MySQL 8.0
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.4"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: reviewreplypro_test
          MYSQL_USER: rrptest
          MYSQL_PASSWORD: rrptestpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          APP_ENV=testing
          APP_DEBUG=false
          APP_URL=http://localhost
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=reviewreplypro_test
          DB_USER=rrptest
          DB_PASS=rrptestpass
          SESSION_SECURE_COOKIE=false
          BILLING_ENABLED=false
          LEGAL_MODE=false
          EOF

      - name: Import schema
        run: |
          mysql -h 127.0.0.1 -u rrptest -prrptestpass reviewreplypro_test < database/schema.sql
          mysql -h 127.0.0.1 -u rrptest -prrptestpass reviewreplypro_test < database/migrate_auth.sql

      - name: PHP syntax check
        run: |
          errors=0
          while IFS= read -r file; do
            php -l "$file" > /dev/null 2>&1 || { echo "Syntaxfehler: $file"; errors=1; }
          done < <(find . -name "*.php" -not -path "./.git/*" -not -path "./vendor/*" | sort)
          exit $errors

      - name: Run unit tests
        run: php tests/run.php

      - name: Run auth & integration tests
        run: php tests/run_auth.php
